name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}" >> .env
          echo "TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}" >> .env

      - name: Set up data directory and dbt profile
        run: |
          mkdir -p data
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          game_pulse:
            outputs:
              dev:
                type: duckdb
                path: ../data/game_pulse.duckdb
                threads: 1
            target: dev
          EOF
          sed -i 's/^          //' ~/.dbt/profiles.yml

      - name: Run smoke tests
        run: python -m tests.test_pipeline --test smoke